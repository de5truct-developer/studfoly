{% extends 'base.html' %}

{% block title %}Удалить проект — StudentHub{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <div class="confirm-card" data-aos="fade-up">
            <div class="confirm-icon danger">
                <i class="fa-solid fa-trash"></i>
            </div>
            <h1>Удалить проект?</h1>
            <p>Вы уверены, что хотите удалить проект <strong>{{ project.title }}</strong>? Это действие нельзя отменить.</p>
            <form method="post" class="confirm-actions">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    <i class="fa-solid fa-trash"></i> Да, удалить
                </button>
                <a href="{% url 'portfolio:project_detail' slug=project.slug %}" class="btn btn-outline">Отмена</a>
            </form>
        </div>
    </div>
</section>
{% endblock %}
